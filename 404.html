<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found | HowLongDrive.com</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root { --primary: #4B6E93; --accent: #EFA24F; --bg: #f8fafc; --card: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
        [data-theme="dark"] {
            --primary: #60A5FA;
            --primary-dark: #3B82F6;
            --accent: #10B981;
            --accent-dark: #059669;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
            --road: #64748b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; }
        .logo { font-weight: 700; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem 1rem; }
        .code { font-size: 7rem; font-weight: 800; color: var(--border); line-height: 1; }
        h1 { font-size: 1.75rem; margin: 1rem 0 0.5rem; }
        p { color: var(--muted); max-width: 420px; margin: 0 auto 2rem; }
        .buttons { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .buttons a { padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary); opacity: 0.9; }
        .btn-outline { border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); }
        footer { border-top: 1px solid var(--border); padding: 1.5rem 0; text-align: center; color: var(--muted); font-size: 0.85rem; }
    
        .theme-toggle { background: none; border: none; cursor: pointer; padding: 0.5rem; font-size: 1.25rem; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
        .theme-toggle:hover { opacity: 0.7; }
        </style>
</head>
<body><script>
        (function(){
            var saved=localStorage.getItem('theme');
            var prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme=saved||(prefersDark?'dark':'light');
            document.documentElement.setAttribute('data-theme',theme);
        })();
    </script>
    
    <header>
        <div class="container">
            <a href="/" class="logo">
                <img src="/assets/logo-header.png" alt="HowLongDrive">
            </a>
        </div>
    </header>
    <main>
        <div>
            <div class="code">404</div>
            <h1>Page Not Found</h1>
            <p>The route you're looking for doesn't exist or may have moved. Try searching for your destination.</p>
            <div class="buttons">
                <a href="/" class="btn-primary">Search Routes</a>
                <a href="/routes/" class="btn-outline">Browse All Routes</a>
                <a href="/cities/" class="btn-outline">Browse Cities</a>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">© 2026 HowLongDrive.com</div>
    </footer>
<script>
    document.querySelectorAll('.theme-toggle').forEach(function(btn){
        var current=document.documentElement.getAttribute('data-theme');
        btn.innerHTML=current==='dark'?'☀️':'🌙';
        btn.addEventListener('click',function(){
            var curr=document.documentElement.getAttribute('data-theme');
            var next=curr==='dark'?'light':'dark';
            document.documentElement.setAttribute('data-theme',next);
            localStorage.setItem('theme',next);
            btn.innerHTML=next==='dark'?'☀️':'🌙';
        });
    });
</script>
</body>
</html>
